name: Render MDX to HTML

on:
  push:
    branches: [main]
    paths:
      - 'posts/**/*.mdx'

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.REPO_DISPATCH_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install render dependencies
        run: npm install remark-parse remark-gfm remark-rehype rehype-stringify unified

      - name: Render MDX to HTML
        run: node scripts/render-mdx.mjs

      - name: Commit rendered HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f posts/**/*.html
          if git diff --staged --quiet; then
            echo "No HTML changes to commit"
          else
            git commit -m "chore: render MDX to HTML [skip ci]"
            git push
          fi
